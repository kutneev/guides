      <stop offset="1" stop-color="#effdf6"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#12b886"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f5fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="28" flood-color="#2a344e" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="900" height="760" rx="36" fill="url(#bg)"/>
  <circle cx="720" cy="126" r="116" fill="#fff" opacity=".5"/>
  <circle cx="150" cy="620" r="138" fill="#dff8ec" opacity=".62"/>

  <g filter="url(#shadow)">

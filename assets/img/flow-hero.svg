    <rect x="148" y="244" width="78" height="14" rx="7" fill="#172033"/>
    <rect x="148" y="294" width="136" height="34" rx="16" fill="#eef4ff"/>
    <rect x="176" y="346" width="112" height="34" rx="16" fill="#e8fbf3"/>
    <rect x="148" y="392" width="126" height="10" rx="5" fill="#d4deeb"/>

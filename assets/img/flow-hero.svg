    <text x="308" y="36" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#2563eb">код</text>
    <text x="414" y="36" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#0f766e">проверка</text>
    <text x="532" y="36" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#2563eb">релиз</text>

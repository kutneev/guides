<svg xmlns="http://www.w3.org/2000/svg" width="900" height="760" viewBox="0 0 900 760" role="img" aria-labelledby="title desc">
  <title id="title">Путь от идеи к результату</title>
  <desc id="desc">Рабочая сцена, где идея превращается в промпт, код и готовый результат</desc>
  <defs>

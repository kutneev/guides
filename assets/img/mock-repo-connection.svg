<svg xmlns="http://www.w3.org/2000/svg" width="760" height="420" viewBox="0 0 760 420" role="img" aria-labelledby="title desc">
  <title id="title">Проверка подключения к репозиторию</title>
  <desc id="desc">Иллюстрация с двумя сообщениями: пользователь просит подключиться к репозиторию guides, Codex подтверждает подключение</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#eef6ff"/>
      <stop offset="1" stop-color="#eefdf6"/>
    </linearGradient>
    <linearGradient id="userBubble" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#172033"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="ok" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#2563eb"/>
      <stop offset="1" stop-color="#12b886"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#2a344e" flood-opacity=".12"/>
    </filter>
  </defs>
  <rect width="760" height="420" rx="28" fill="url(#bg)"/>
  <circle cx="116" cy="92" r="82" fill="#ffffff" opacity=".55"/>
  <circle cx="650" cy="330" r="112" fill="#dff8ec" opacity=".62"/>

  <g filter="url(#shadow)">
    <rect x="54" y="54" width="652" height="312" rx="30" fill="#fff" opacity=".86"/>
  </g>

  <g transform="translate(132 94)">
    <rect x="142" y="0" width="396" height="82" rx="28" fill="url(#userBubble)"/>
    <text x="172" y="36" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#fff">подключись к</text>
    <text x="172" y="66" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#fff">репозиторию guides</text>
    <path d="M508 72l28 26-4-38z" fill="#2563eb"/>
  </g>

  <g transform="translate(92 220)">
    <rect x="0" y="0" width="486" height="92" rx="28" fill="#f4f8ff" stroke="#d7e4f5"/>
    <circle cx="46" cy="46" r="22" fill="url(#ok)"/>
    <path d="M36 47l8 8 16-20" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="86" y="38" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#172033">подключился к</text>
    <text x="86" y="68" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" fill="#172033">репозиторию guides</text>
    <path d="M22 80l-24 24 8-36z" fill="#f4f8ff" stroke="#d7e4f5" stroke-width="1"/>
  </g>

  <g transform="translate(596 216)">
    <rect width="74" height="74" rx="22" fill="#ffffff" opacity=".92" stroke="#dbe6f3"/>
    <rect x="20" y="22" width="34" height="6" rx="3" fill="#172033"/>
    <rect x="20" y="36" width="28" height="6" rx="3" fill="#9fb0c8"/>
    <rect x="20" y="50" width="22" height="6" rx="3" fill="#c9d5e5"/>
  </g>
</svg>

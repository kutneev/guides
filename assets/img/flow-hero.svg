    <path d="M158 310h96M186 362h76" stroke="#b9c8dd" stroke-width="7" stroke-linecap="round"/>
    <text x="148" y="470" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#2563eb">идея + вопросы</text>
  </g>


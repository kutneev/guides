<svg xmlns="http://www.w3.org/2000/svg" width="520" height="420" viewBox="0 0 520 420" role="img" aria-labelledby="title desc">
  <title id="title">Скриншот с подсказкой куда нажать</title>
  <desc id="desc">Нейтральное окно настроек с выделенной кнопкой и небольшим указателем следующего шага</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#f2fbf7"/>
    </linearGradient>
    <linearGradient id="button" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#172033"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#2a344e" flood-opacity=".13"/>
    </filter>
  </defs>
  <rect width="520" height="420" rx="28" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <rect x="52" y="54" width="416" height="312" rx="26" fill="#fff"/>
    <rect x="52" y="54" width="416" height="46" rx="26" fill="#f4f6fb"/>
    <circle cx="82" cy="78" r="6" fill="#ffb86c"/>
    <circle cx="104" cy="78" r="6" fill="#12b886"/>
    <circle cx="126" cy="78" r="6" fill="#2563eb"/>
    <rect x="168" y="70" width="154" height="16" rx="8" fill="#ffffff" stroke="#dce4f2"/>
  </g>
  <rect x="92" y="132" width="130" height="14" rx="7" fill="#172033"/>
  <rect x="92" y="178" width="278" height="44" rx="16" fill="#eef4ff"/>
  <rect x="116" y="194" width="152" height="12" rx="6" fill="#cbd8ea"/>
  <rect x="92" y="244" width="278" height="44" rx="16" fill="#eef4ff"/>
  <rect x="116" y="260" width="180" height="12" rx="6" fill="#cbd8ea"/>
  <g>
    <rect x="282" y="306" width="120" height="38" rx="19" fill="url(#button)"/>
    <text x="342" y="331" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#fff">Continue</text>
    <rect x="274" y="298" width="136" height="54" rx="27" fill="none" stroke="#12b886" stroke-width="4"/>
  </g>
  <g>
    <rect x="292" y="222" width="154" height="54" rx="18" fill="#fff" stroke="#d9e4f2"/>
    <text x="318" y="255" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#172033">Нажать сюда</text>
    <path d="M352 276 L344 302" fill="none" stroke="#12b886" stroke-width="5" stroke-linecap="round"/>
    <path d="M344 302 L334 288 M344 302 L360 296" fill="none" stroke="#12b886" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>

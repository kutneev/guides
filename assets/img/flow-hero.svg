    <rect x="654" y="250" width="76" height="12" rx="6" fill="#172033"/>
    <rect x="654" y="300" width="96" height="10" rx="5" fill="#d3ddeb"/>
    <rect x="654" y="326" width="72" height="10" rx="5" fill="#e0e7f2"/>
